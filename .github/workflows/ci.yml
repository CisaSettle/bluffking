name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        # engine + mental-poker are DB-free — no Postgres service needed.
        run: cargo test --workspace

      - name: mp-wasm (wasm32 build check)
        # mp-wasm is a detached crate (own workspace, targets wasm32), so the
        # root `--workspace` commands above don't cover it.
        run: cd mp-wasm && cargo check --target wasm32-unknown-unknown

      - name: cargo-deny (advisories + licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2

      - name: pre-publish gate (secret / data-provenance scan)
        # BLOCKING: this repo is public (see PUBLISH-BLOCKERS.md), and OSS-native
        # files are committed here directly (not via the texas-h5 oss-sync gate),
        # so this secret/provenance scan is the automated backstop for every push
        # and external PR. It must exit 0.
        run: bash scripts/prepublish-check.sh
